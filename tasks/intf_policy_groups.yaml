---
- name: Create Interface Policy Groups
  aci_rest:
    host: "{{ apic_info.host }}"
    username: "{{ apic_info.username }}"
    password: "{{ apic_info.password }}"
    validate_certs: no
    use_proxy: no
    path: /api/mo/.json
    method: post
    content:
      infraAccPortGrp:
        attributes:
          dn: uni/infra/funcprof/accportgrp-{{ item.name }}
          name: "{{ item.name }}"
          descr: "{{ shared_vars.descr }}"
          rn: accportgrp-{{ item.name }}
          status: "{{ 'deleted' if (state | default('present')) == 'absent' else 'created,modified' }}"
        children:
          - infraRsAttEntP:
              attributes:
                tDn: uni/infra/attentp-{{ aaep.aaepName }}
                status: "{{ 'deleted' if (state | default('present')) == 'absent' else 'created,modified' }}"
              children: []
          - infraRsCdpIfPol:
              attributes:
                tnCdpIfPolName: "{{ cdp_policy.cdpPolicyName if item.cdp else '' }}"
                status: "{{ 'deleted' if (state | default('present')) == 'absent' else 'created,modified' }}"
              children: []
          - infraRsLldpIfPol:
              attributes:
                tnLldpIfPolName: "{{ lldp_policy.lldpPolicyName if item.lldp else '' }}"
                status: "{{ 'deleted' if (state | default('present')) == 'absent' else 'created,modified' }}"
              children: []
          - infraRsHIfPol:
              attributes:
                tnFabricHIfPolName: "link_{{ item.speed }}"
                status: created,modified
              children: []
  with_items:
    "{{ intf_policies }}"
