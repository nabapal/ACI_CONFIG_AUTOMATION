---
- name: Create Interface Policy Leaf Profiles
  aci_rest:
    host: "{{ apic_info.host }}"
    username: "{{ apic_info.username }}"
    password: "{{ apic_info.password }}"
    validate_certs: no
    use_proxy: no
    path: /api/mo/.json
    method: post
    content:
      infraAccPortP:
        attributes:
          annotation: ''
          descr: "{{shared_vars.descr}}"
          dn: uni/infra/accportprof-{{item}}
          name: "{{item}}"
          nameAlias: ''
          ownerKey: ''
          ownerTag: ''
          status: "{{ 'deleted' if (state | default('present')) == 'absent' else 'created,modified' }}"
  with_items:
    "{{ifPolicyLeafProfileNames}}"
  loop_control:
    pause: .5
