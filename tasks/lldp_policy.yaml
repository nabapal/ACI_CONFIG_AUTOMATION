---
- name: Create LLDP Policy
  aci_rest:
    host: "{{ apic_info.host }}"
    username: "{{ apic_info.username }}"
    password: "{{ apic_info.password }}"
    validate_certs: no
    use_proxy: no
    path: /api/mo/.json
    method: post
    content:
      lldpIfPol:
        attributes:
          annotation: ''
          descr: "{{ shared_vars.descr }}"
          dn: uni/infra/lldpIfP-{{ lldp_policy.lldpPolicyName }}
          name: "{{ lldp_policy.lldpPolicyName }}"
          nameAlias: ''
          ownerKey: ''
          ownerTag: ''
          status: "{{ 'deleted' if (state | default('present')) == 'absent' else 'created,modified' }}"
