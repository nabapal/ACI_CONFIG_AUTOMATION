---
- name: Create Switch Policy Leaf Profiles
  aci_rest:
    host: "{{ apic_info.host }}"
    username: "{{ apic_info.username }}"
    password: "{{ apic_info.password }}"
    validate_certs: no
    use_proxy: no
    path: /api/mo/.json
    method: post
    content:
      infraNodeP:
        attributes:
          annotation: ''
          descr: "{{shared_vars.descr}}"
          dn: uni/infra/nprof-{{item.swPolicyLeafProfileName}}
          name: "{{item.swPolicyLeafProfileName}}"
          nameAlias: ''
          ownerKey: ''
          ownerTag: ''
          status: "{{ 'deleted' if (state | default('present')) == 'absent' else 'created,modified' }}"
        children:
        - infraRsAccPortP:
            attributes:
              annotation: ''
              tDn: uni/infra/accportprof-{{item.swPolicyLeafProfileName}}
        - infraLeafS:
            attributes:
              annotation: ''
              descr: "{{shared_vars.descr}}"
              name: "{{item.leafName}}"
              nameAlias: ''
              ownerKey: ''
              ownerTag: ''
              type: range
            children:
            - infraNodeBlk:
                attributes:
                  annotation: ''
                  descr: "{{shared_vars.descr}}"
                  from_: "{{item.leafId}}"
                  name: ae13e494071b4fda
                  nameAlias: ''
                  to_: "{{item.leafId}}"
  with_items:
    "{{swPolicyLeafProfiles}}"
  loop_control:
    pause: .5
