---
- name: Create Interface Selectors
  aci_rest:
    host: "{{ apic_info.host }}"
    username: "{{ apic_info.username }}"
    password: "{{ apic_info.password }}"
    validate_certs: no
    use_proxy: no
    path: /api/mo/.json
    method: post
    content:
      infraHPortS:
        attributes:
          annotation: ''
          descr: ''
          dn: uni/infra/accportprof-{{item.ifPolicyLeafProfileName}}/hports-{{item.interface_name}}-typ-range
          name: "{{item.interface_name}}"
          nameAlias: ''
          ownerKey: ''
          ownerTag: ''
          type: range
          status: "{{ 'deleted' if (state | default('present')) == 'absent' else 'created,modified' }}"
        children:
        - infraRsAccBaseGrp:
            attributes:
              annotation: ''
              fexId: '101'
              tDn: uni/infra/funcprof/accportgrp-{{item.intf_policy}}
        - infraPortBlk:
            attributes:
              annotation: ''
              descr: ''
              fromCard: "{{item.fromCard}}"
              fromPort: "{{item.fromPort}}"
              name: block2
              nameAlias: ''
              toCard: "{{item.toCard}}"
              toPort: "{{item.toPort}}"
  with_items:
    "{{interfaceSelectors}}"
  loop_control:
    pause: .5
