<!DOCTYPE html>
<html>
<head>
    <title>Tenants</title>
</head>
<body>
    <h1>Tenants</h1>
    <a href="{{ url_for('add_tenant') }}">Add Tenant</a>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>APIC URL</th>
            <th>Description</th>
            <th>Actions</th>
        </tr>
        {% for tenant in tenants %}
        <tr>
            <td>{{ tenant.name }}</td>
            <td>{{ tenant.apic_url }}</td>
            <td>{{ tenant.description }}</td>
            <td>
                <a href="{{ url_for('edit_tenant', tenant_id=tenant.id) }}">Edit</a>
                <form action="{{ url_for('delete_tenant', tenant_id=tenant.id) }}" method="post" style="display:inline;" onsubmit="return confirm('Are you sure you want to delete this tenant?');">
                    <button type="submit">Delete</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
